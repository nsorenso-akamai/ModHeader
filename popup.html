<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; width: 350px; padding: 12px; margin: 0; }
    h3 { margin-top: 0; color: #333; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    button { padding: 6px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #f5f5f5; }
    button.remove-btn { background: #ff4d4d; color: white; border: none; font-weight: bold; }
    #add-row { width: 100%; margin-top: 5px; background: #e1e1e1; color: #333; font-weight: bold; }
    #save { width: 100%; margin-top: 10px; background: #007bff; color: white; border: none; padding: 8px; font-weight: bold; font-size: 14px; }
    #save:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h3>Request Headers</h3>
  <div id="header-list"></div>
  <button id="add-row">+ Add New Header</button>
  <button id="save">Apply Headers</button>
  <script src="popup.js"></script>
</body>
</html>
